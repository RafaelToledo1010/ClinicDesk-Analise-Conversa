<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Climes — Criar nova senha</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #F0F4F8; }
    .login-box { background: white; border-radius: 12px; padding: 2.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo .logo-icon { font-size: 48px; }
    .login-logo h1 { font-size: 22px; color: #1F4E79; font-weight: 700; margin-top: 8px; }
    .login-logo p { color: #6C757D; font-size: 13px; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1.5px solid #DEE2E6; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: #2E75B6; }
    .btn-login { width: 100%; padding: 12px; background: #1F4E79; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn-login:hover { background: #2E75B6; }
    .erro-login { background: #FFC7CE; color: #C0392B; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 1rem; }
    .aviso { background: #FFEB9C; color: #856404; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon">🔐</div>
        <h1>Criar nova senha</h1>
        <p>Por segurança, defina sua senha pessoal</p>
      </div>
      <div class="aviso">⚠️ Este é seu primeiro acesso. Crie uma senha pessoal para continuar.</div>
      {% if erro %}
      <div class="erro-login">❌ {{ erro }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Nova senha</label>
          <input type="password" name="senha_nova" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirmar senha</label>
          <input type="password" name="senha_confirma" placeholder="Repita a senha" required minlength="6">
        </div>
        <button type="submit" class="btn-login">Salvar e entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
